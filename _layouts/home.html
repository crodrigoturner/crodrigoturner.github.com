<section>

    <article class="hero">
  <h1 class="hero-greeting" id="hero-greeting">
 <script>
currentTime=new Date();
//getHour() function will retrieve the hour from current time
if(currentTime.getHours()<13)
document.write("Good morning!");
else if(currentTime.getHours()<17)
document.write("Good afternoon!");
else
document.write("Good evening!");
var weekday = new Array(7)
weekday[0] = " Sunday"
weekday[1] = " Monday"
weekday[2] = " Tuesday"
weekday[3] = " Wednesday"
weekday[4] = " Thursday"
weekday[5] = " Friday"
weekday[6] = " Saturday"
var currentDate = new Date()
weekdayValue = currentDate.getDay()
document.write(
" I hope you're having a great" + weekday[weekdayValue] + "."
)
</script>
  </h1>
  <p class="hero-name">
    My name is Carlos Roberto Rodrigo Turner. This is my blog.
  </p>

</article>

            {% for post in site.posts limit:15 %}
            {% if post.category == "post"  %}
           <article class="post {{ post.tag }}"><h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
                {{post.content}}
           </article>
            {% endif %}
            {% endfor %}
